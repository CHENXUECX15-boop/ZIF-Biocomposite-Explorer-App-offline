<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Phase Ternary Stack</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="title-row">
        <h1>ZIF Biocomposite Explorer App - Offline Version</h1>
        <a
          class="ptc-logo-link"
          href="https://www.tugraz.at/institute/ptc/home"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Open PTC Institute homepage"
        >
          <img src="assets/ptc-logo-transparent.png" alt="PTC Institute of Physical and Theoretical Chemistry" />
        </a>
      </div>
      <button id="downloadPagePng" class="tool-button primary page-download-button" type="button">
        Download Page PNG
      </button>
    </header>

    <main class="app-shell">
      <aside class="controls-panel" aria-label="Display controls">
        <section class="control-section">
          <h2>Dataset</h2>
          <div class="dataset-tabs" aria-label="Dataset">
            <button class="dataset-tab is-active" type="button" data-dataset="WW">WW</button>
            <button class="dataset-tab" type="button" data-dataset="EW">EW</button>
          </div>
        </section>

        <section class="control-section">
          <h2>Concentration</h2>
          <div class="filter-group" id="concentrationFilters" aria-label="Concentration filter"></div>
        </section>

        <section class="control-section">
          <h2>Visualization</h2>
          <div class="metric-tabs" id="visualizationFilters" aria-label="Visualization mode">
            <button class="metric-tab is-active" type="button" data-visualization="phase">Phase</button>
            <button class="metric-tab" type="button" data-visualization="EE">EE%</button>
            <button class="metric-tab" type="button" data-visualization="LC">LC%</button>
            <button class="metric-tab" type="button" data-visualization="IR">IR-ratio%</button>
          </div>
        </section>

        <section class="control-section">
          <h2>Interactive filters</h2>
          <div class="range-filter-grid" id="valueFilters" aria-label="M, L, BSA, EE, and LC filters">
            <label class="range-filter">
              <span>M%</span>
              <span class="range-fields">
                <input type="number" min="0" max="100" step="1" value="0" data-filter-key="M" data-range-bound="min" />
                <span>-</span>
                <input type="number" min="0" max="100" step="1" value="100" data-filter-key="M" data-range-bound="max" />
              </span>
            </label>
            <label class="range-filter">
              <span>L%</span>
              <span class="range-fields">
                <input type="number" min="0" max="100" step="1" value="0" data-filter-key="L" data-range-bound="min" />
                <span>-</span>
                <input type="number" min="0" max="100" step="1" value="100" data-filter-key="L" data-range-bound="max" />
              </span>
            </label>
            <label class="range-filter">
              <span>BSA%</span>
              <span class="range-fields">
                <input type="number" min="0" max="100" step="1" value="0" data-filter-key="BSA" data-range-bound="min" />
                <span>-</span>
                <input type="number" min="0" max="100" step="1" value="100" data-filter-key="BSA" data-range-bound="max" />
              </span>
            </label>
            <label class="range-filter">
              <span>EE%</span>
              <span class="range-fields">
                <input type="number" min="0" max="100" step="0.1" value="0" data-filter-key="EE" data-range-bound="min" />
                <span>-</span>
                <input type="number" min="0" max="100" step="0.1" value="100" data-filter-key="EE" data-range-bound="max" />
              </span>
            </label>
            <label class="range-filter">
              <span>LC%</span>
              <span class="range-fields">
                <input type="number" min="0" max="100" step="0.1" value="0" data-filter-key="LC" data-range-bound="min" />
                <span>-</span>
                <input type="number" min="0" max="100" step="0.1" value="100" data-filter-key="LC" data-range-bound="max" />
              </span>
            </label>
          </div>
          <button id="resetValueFilters" class="filter-reset" type="button">Reset filters</button>
        </section>

        <section class="control-section">
          <h2>Phase</h2>
          <div class="filter-group" id="phaseFilters" aria-label="Phase filter"></div>
        </section>

        <section class="control-section">
          <h2>Navigation</h2>
          <div class="mode-tabs" aria-label="Drag mode">
            <button class="mode-tab is-active" type="button" data-drag-mode="rotate">Rotate</button>
            <button class="mode-tab" type="button" data-drag-mode="pan">Pan</button>
          </div>
        </section>
      </aside>

      <section class="visual-surface" aria-label="Stacked ternary plot">
        <div class="plot-toolbar">
          <div class="legend" id="legend" aria-label="Phase legend"></div>
          <div class="figure-controls">
            <div class="figure-actions">
              <button id="resetView" class="tool-button" type="button">Reset View</button>
              <button id="downloadPng" class="tool-button primary" type="button">Download PNG</button>
            </div>
          </div>
        </div>
        <div class="plot-frame">
          <svg id="ternaryStack" role="img" aria-label="Five stacked ternary phase layers"></svg>
          <div class="phase-legend-dock is-hidden" id="phaseLegendDock" aria-label="Visualization legend"></div>
          <div class="view-gizmo" aria-label="View and zoom controls">
            <div class="gizmo-row">
              <button class="gizmo-axis x-axis" type="button" data-view="x" title="Side view">X</button>
              <button class="gizmo-axis y-axis" type="button" data-view="y" title="Front view">Y</button>
            </div>
            <div class="gizmo-row">
              <button class="gizmo-axis z-axis" type="button" data-view="z" title="Top view">Z</button>
              <button class="gizmo-axis l-axis" type="button" data-view="l" title="L direction">L</button>
            </div>
            <div class="gizmo-zoom">
              <button id="zoomIn" type="button" title="Zoom in">+</button>
              <button id="zoomOut" type="button" title="Zoom out">-</button>
            </div>
          </div>
        </div>
      </section>

      <aside class="detail-panel" aria-label="Selected sample phase result">
        <div class="detail-heading">
          <p class="eyebrow" id="detailDataset">WW</p>
          <h2 id="detailTitle">Sample 34</h2>
        </div>

        <div class="phase-result">
          <span id="selectedConcentration">100 mg mL<sup>-1</sup></span>
          <strong id="selectedPhase">-</strong>
        </div>

        <dl class="composition-grid">
          <div>
            <dt>M</dt>
            <dd id="detailM">-</dd>
          </div>
          <div>
            <dt>L</dt>
            <dd id="detailL">-</dd>
          </div>
          <div>
            <dt>BSA</dt>
            <dd id="detailBSA">-</dd>
          </div>
          <div>
            <dt>L/M</dt>
            <dd id="detailRatio">-</dd>
          </div>
          <div>
            <dt>EE +/- error bar</dt>
            <dd id="detailEE">-</dd>
          </div>
          <div>
            <dt>LC</dt>
            <dd id="detailLC">-</dd>
          </div>
          <div class="wide-metric">
            <dt>IR-ratio</dt>
            <dd id="detailIR">-</dd>
          </div>
        </dl>

        <div class="phase-table-wrap">
          <table class="phase-table">
            <thead>
              <tr>
                <th>Total concentration</th>
                <th>Phase</th>
                <th>EE%</th>
                <th>LC%</th>
                <th>IR-ratio%</th>
              </tr>
            </thead>
            <tbody id="phaseRows"></tbody>
          </table>
        </div>

        <section class="xrd-panel" aria-label="Selected sample PXRD patterns">
          <div class="xrd-heading">
            <h3>PXRD patterns</h3>
            <div class="spectrum-toolbar">
              <span id="xrdStatus">-</span>
              <button id="xrdDownloadCsv" class="spectrum-button" type="button" title="Download PXRD CSV">CSV</button>
              <button id="xrdDownloadPng" class="spectrum-button" type="button" title="Download PXRD PNG">PNG</button>
              <button id="xrdReset" class="spectrum-button" type="button" title="Reset PXRD zoom and pan">Reset</button>
              <button id="xrdZoomOut" class="spectrum-button icon-button" type="button" title="PXRD zoom out">-</button>
              <button id="xrdZoomIn" class="spectrum-button icon-button" type="button" title="PXRD zoom in">+</button>
            </div>
          </div>
          <svg id="xrdPlot" role="img" aria-label="Triplicate PXRD patterns"></svg>
          <div class="xrd-legend" id="xrdLegend"></div>
        </section>

        <section class="xrd-panel ir-panel" aria-label="Selected sample ATR-IR spectrum">
          <div class="xrd-heading">
            <h3>ATR-IR spectrum</h3>
            <div class="spectrum-toolbar">
              <span id="irStatus">-</span>
              <button id="irDownloadCsv" class="spectrum-button" type="button" title="Download ATR-IR CSV">CSV</button>
              <button id="irDownloadPng" class="spectrum-button" type="button" title="Download ATR-IR PNG">PNG</button>
              <button id="irReset" class="spectrum-button" type="button" title="Reset ATR-IR zoom and pan">Reset</button>
              <button id="irZoomOut" class="spectrum-button icon-button" type="button" title="ATR-IR zoom out">-</button>
              <button id="irZoomIn" class="spectrum-button icon-button" type="button" title="ATR-IR zoom in">+</button>
            </div>
          </div>
          <svg id="irPlot" role="img" aria-label="Selected sample ATR-IR spectrum"></svg>
        </section>
      </aside>
    </main>

    <script src="data/phase-data.js"></script>
    <script src="data/metrics-data.js"></script>
    <script src="data/ir-ratio-data.js"></script>
    <script src="data/xrd-data.js"></script>
    <script src="data/ir-data.js"></script>
    <script src="app.js?v=20260522-page-export3"></script>
  </body>
</html>
